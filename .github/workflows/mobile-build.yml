name: Mobile Build

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  android-release-apk:
    name: Android release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            : "${ANDROID_KEYSTORE_PASSWORD:?ANDROID_KEYSTORE_PASSWORD is required when ANDROID_KEYSTORE_BASE64 is set}"
            : "${ANDROID_KEY_ALIAS:?ANDROID_KEY_ALIAS is required when ANDROID_KEYSTORE_BASE64 is set}"
            : "${ANDROID_KEY_PASSWORD:?ANDROID_KEY_PASSWORD is required when ANDROID_KEYSTORE_BASE64 is set}"
            mkdir -p android/keystores
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/keystores/bangbang-release.jks
            {
              echo "storeFile=keystores/bangbang-release.jks"
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
            } > android/keystore.properties
            chmod 600 android/keystore.properties
          else
            npm run android:prepare-signing
          fi

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Collect APK
        run: |
          mkdir -p release/android
          cp android/app/build/outputs/apk/release/app-release.apk release/android/profession-ball-arena-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: profession-ball-arena-release-apk
          path: release/android/profession-ball-arena-release.apk
          if-no-files-found: error

  ios-unsigned-ipa:
    name: iOS unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Archive unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/ios/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          rm -rf release/ios/Payload
          mkdir -p release/ios/Payload
          cp -R ios/build/App.xcarchive/Products/Applications/App.app release/ios/Payload/
          cd release/ios
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload profession-ball-arena-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: profession-ball-arena-unsigned-ipa
          path: release/ios/profession-ball-arena-unsigned.ipa
          if-no-files-found: error
