apply plugin: 'com.android.application'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
}

def signingValue = { propertyName, envName ->
    keystoreProperties.getProperty(propertyName) ?: System.getenv(envName)
}

def releaseStoreFile = signingValue('storeFile', 'ANDROID_KEYSTORE_FILE')
def releaseStorePassword = signingValue('storePassword', 'ANDROID_KEYSTORE_PASSWORD')
def releaseKeyAlias = signingValue('keyAlias', 'ANDROID_KEY_ALIAS')
def releaseKeyPassword = signingValue('keyPassword', 'ANDROID_KEY_PASSWORD')
def releaseSigningReady = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword
def socialValue = { propertyName, envName, fallbackValue = '' ->
    project.findProperty(propertyName)?.toString() ?: System.getenv(envName) ?: fallbackValue
}
def facebookAppId = socialValue('facebookAppId', 'FACEBOOK_APP_ID', '1013763001162439')
def facebookClientToken = socialValue('facebookClientToken', 'FACEBOOK_CLIENT_TOKEN')
def tiktokClientKey = socialValue('tiktokClientKey', 'TIKTOK_CLIENT_KEY')
def deepLinkHost = socialValue('deepLinkHost', 'BATTLE_DEEP_LINK_HOST', 'professionballarena.top')

android {
    namespace = "com.professionballarena.game"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.professionballarena.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 2
        versionName "1.0.1"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [
            facebookAppId: facebookAppId ?: '0',
            deepLinkHost: deepLinkHost,
        ]
        resValue "string", "facebook_app_id", facebookAppId
        resValue "string", "facebook_client_token", facebookClientToken
        resValue "string", "tiktok_client_key", tiktokClientKey
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (releaseSigningReady) {
                storeFile rootProject.file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseSigningReady) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
    maven { url "https://artifact.bytedance.com/repository/AwemeOpenSDK" }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation platform('com.google.firebase:firebase-bom:34.13.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.android.play:review:2.0.2'
    implementation 'com.facebook.android:facebook-share:18.2.3'
    implementation 'com.tiktok.open.sdk:tiktok-open-sdk-core:2.4.0'
    implementation 'com.tiktok.open.sdk:tiktok-open-sdk-share:2.4.0'
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
